project_id = "rota-brasil-tycoon"

[api]
enabled = true
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[realtime]
enabled = true

[storage.vector]
enabled = false

[auth]
enabled = true
site_url = "https://paulocardosopub.github.io/rota-brasil-tycoon/"
additional_redirect_urls = [
  "https://paulocardosopub.github.io/rota-brasil-tycoon/**",
  "http://localhost:5173/**",
  "http://127.0.0.1:5173/**",
  "http://localhost:4173/**",
  "http://127.0.0.1:4173/**"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = true
enable_manual_linking = true

[auth.rate_limit]
email_sent = 2
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[edge_runtime]
enabled = true
policy = "per_worker"

[functions.join-online-world]
enabled = true
verify_jwt = true

[functions.claim-vehicle-control]
enabled = true
verify_jwt = true

[functions.release-vehicle-control]
enabled = true
verify_jwt = true

[functions.online-heartbeat]
enabled = true
verify_jwt = true

[functions.report-online-incident]
enabled = true
verify_jwt = true

[functions.report-player-location]
enabled = true
verify_jwt = true

[functions.create-fleet-deployment]
enabled = true
verify_jwt = true

[functions.finish-fleet-deployment]
enabled = true
verify_jwt = true
